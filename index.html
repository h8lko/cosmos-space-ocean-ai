<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA · Intelligence HUD</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Rajdhani:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #03050a;
  --c-surface: rgba(12,16,28,0.75);
  --c-border: rgba(255,255,255,0.1);
  --accent: #4f9eff;
  --accent-glow: rgba(79,158,255,0.25);
  --font-ui: 'Space Grotesk', sans-serif;
  --font-hd: 'Rajdhani', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --sidebar-w: 300px;
}
body.ocean { --accent:#00f2ff; --accent-glow:rgba(0,242,255,0.18); --c-bg:#000a0f; }

*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--c-bg);color:#e2e8f0;font-family:var(--font-ui);height:100vh;overflow:hidden;display:flex;}
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;}
.app{position:relative;z-index:1;display:flex;width:100%;height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:rgba(0,0,0,0.65);backdrop-filter:blur(25px);border-right:1px solid var(--c-border);display:flex;flex-direction:column;overflow:hidden;}

.logo-block{padding:20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--c-border);flex-shrink:0;background:rgba(0,0,0,0.2);}
.logo-icon{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 0 8px var(--accent));flex-shrink:0;background:rgba(255,255,255,0.05);border-radius:8px;padding:4px;border:1px solid var(--c-border);}
.logo-name{font-family:var(--font-hd);font-size:24px;font-weight:700;letter-spacing:4px;color:var(--accent);}

.mode-switch{display:flex;gap:5px;padding:14px;flex-shrink:0;}
.mode-btn{flex:1;padding:9px;background:rgba(255,255,255,0.03);border:1px solid var(--c-border);color:rgba(255,255,255,0.45);cursor:pointer;font-family:var(--font-hd);font-size:12px;letter-spacing:2px;transition:0.25s;}
.mode-btn.active{background:var(--accent);color:#000;font-weight:700;}
.mode-btn:disabled{opacity:0.35;cursor:not-allowed;}

.nav-label{padding:10px 20px 5px;font-size:9px;font-family:var(--font-mono);color:var(--accent);letter-spacing:2px;flex-shrink:0;opacity:0.8;}

.questions-list{padding:0 14px 10px;display:flex;flex-direction:column;gap:5px;flex-shrink:0;}
.q-card{padding:8px 11px;background:rgba(255,255,255,0.02);border:1px solid var(--c-border);border-left:3px solid var(--accent);font-size:11px;cursor:pointer;transition:0.2s;color:rgba(255,255,255,0.65);}
.q-card:hover{background:var(--accent-glow);transform:translateX(4px);}
.q-card.disabled{opacity:0.35;cursor:not-allowed;transform:none!important;}

.sessions-section{flex:1;display:flex;flex-direction:column;border-top:1px solid var(--c-border);min-height:0;overflow:hidden;}
.sessions-list{flex:1;overflow-y:auto;padding:0 14px 8px;}
.sessions-list::-webkit-scrollbar{width:2px;}
.sessions-list::-webkit-scrollbar-thumb{background:var(--accent);opacity:0.4;}

.session-item{padding:9px 10px;border-radius:3px;cursor:pointer;font-size:11px;margin-top:4px;color:rgba(255,255,255,0.45);border:1px solid transparent;transition:0.18s;display:flex;align-items:center;gap:8px;}
.session-item:hover{background:rgba(255,255,255,0.04);border-color:var(--c-border);color:rgba(255,255,255,0.75);}
.session-item.active{border-color:var(--accent);background:var(--accent-glow);color:#fff;}
.session-info{flex:1;min-width:0;}
.session-title-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11px;}
.session-date{font-size:9px;font-family:var(--font-mono);color:rgba(255,255,255,0.25);margin-top:1px;}
.session-del{opacity:0;background:none;border:none;color:rgba(255,80,80,0.6);cursor:pointer;font-size:14px;padding:2px 5px;flex-shrink:0;transition:0.15s;border-radius:3px;}
.session-item:hover .session-del{opacity:1;}
.session-del:hover{color:#ff5050;background:rgba(255,80,80,0.12);}

.sidebar-footer{padding:12px 14px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--c-border);}
.new-mission-btn{padding:11px;background:var(--accent);color:#000;border:none;font-family:var(--font-hd);font-weight:700;cursor:pointer;letter-spacing:2px;font-size:12px;transition:opacity 0.2s;}
.new-mission-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;position:relative;min-width:0;}

.topbar{padding:11px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--c-border);background:rgba(0,0,0,0.3);flex-shrink:0;gap:16px;}
.live-status{display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;flex-shrink:0;}
.online .status-dot{background:#00ff64;box-shadow:0 0 8px #00ff64;animation:pdot 2s infinite;}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:0.4}}
.hud-right{display:flex;align-items:center;gap:16px;}
.hud-sid{font-family:var(--font-mono);font-size:9px;opacity:0.3;}
.ctx-counter{font-family:var(--font-mono);font-size:10px;color:var(--accent);opacity:0.65;padding:2px 7px;border:1px solid var(--c-border);border-radius:3px;background:rgba(0,0,0,0.3);}

/* ── CHAT ── */
.chat-wrap{flex:1;overflow-y:auto;padding:28px 36px;display:flex;flex-direction:column;scroll-behavior:smooth;}
.chat-wrap::-webkit-scrollbar{width:3px;}
.chat-wrap::-webkit-scrollbar-thumb{background:var(--accent);opacity:0.3;}

/* Welcome */
.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0;min-height:400px;}
.orb-container{width:160px;height:160px;position:relative;margin-bottom:26px;}
.orb{width:100%;height:100%;border-radius:50%;background:radial-gradient(circle at 30% 30%,var(--accent),#000);box-shadow:inset -10px -10px 50px rgba(0,0,0,0.8),0 0 50px var(--accent-glow);display:flex;align-items:center;justify-content:center;animation:float 4s ease-in-out infinite;}


.orb-img{width:130px;height:130px;max-width:100%;object-fit:contain;filter:drop-shadow(0 0 15px rgba(255,255,255,0.5));animation:orbImgFloat 6s ease-in-out infinite;}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes orbImgFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-5px) scale(1.05)}}
.welcome h2{font-family:var(--font-hd);font-size:30px;letter-spacing:10px;margin:0;line-height:1;}
.welcome p{opacity:0.35;font-size:11px;font-family:var(--font-mono);margin-top:8px;}

/* AI portrait next to welcome title */
.welcome-header{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:12px;}
.ai-portrait{
  width:64px;height:64px;
  object-fit:contain;
  border-radius:8px;
  /* Place your AI portrait at: images/nova-portrait.png (space) or images/marina-portrait.png (ocean) */
}

/* Messages */
.msg{max-width:860px;width:100%;margin-bottom:22px;display:flex;gap:14px;animation:msgIn 0.3s ease;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-body{display:flex;flex-direction:column;gap:8px;max-width:82%;}
.bubble{padding:15px 18px;background:var(--c-surface);border:1px solid var(--c-border);line-height:1.75;font-size:14px;}
.bot .bubble{border-left:3px solid var(--accent);}
.user .bubble{border-right:3px solid rgba(255,255,255,0.35);text-align:right;}
.msg-ts{font-size:9px;font-family:var(--font-mono);color:rgba(255,255,255,0.2);padding:0 3px;}
.msg.user .msg-ts{text-align:right;}

.nasa-card{border:1px solid var(--accent);background:rgba(0,0,0,0.5);border-radius:6px;overflow:hidden;box-shadow:0 0 18px var(--accent-glow);margin-bottom:12px;}
.nasa-card img{width:100%;height:240px;display:block;object-fit:cover;transition:transform 0.4s ease;}
.nasa-card:hover img{transform:scale(1.02);}
.nasa-cap{padding:9px 12px;font-size:10px;font-family:var(--font-mono);color:var(--accent);background:rgba(0,0,0,0.8);border-top:1px solid var(--c-border);text-align:center;}

.typing-dots{display:flex;gap:5px;padding:16px 18px;background:var(--c-surface);border:1px solid var(--c-border);border-left:3px solid var(--accent);width:fit-content;}
.typing-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:tdot 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:0.2s;}
.typing-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);opacity:0.3}30%{transform:translateY(-6px);opacity:1}}

.typing-cursor::after{content:'|';animation:blink 0.7s infinite;color:var(--accent);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Input */
.input-section{padding:18px 36px 22px;flex-shrink:0;border-top:1px solid var(--c-border);background:rgba(0,0,0,0.2);}
.command-bar{max-width:820px;margin:0 auto;display:flex;background:rgba(255,255,255,0.03);border:1px solid var(--accent);backdrop-filter:blur(15px);box-shadow:0 0 22px var(--accent-glow);gap:8px;padding-right:10px;align-items:flex-end;}
textarea#chat-input{flex:1;background:transparent;border:none;outline:none;color:#fff;padding:15px 18px;font-size:15px;resize:none;font-family:var(--font-ui);line-height:1.5;min-height:52px;max-height:120px;}
textarea#chat-input::placeholder{color:rgba(255,255,255,0.22);}
textarea#chat-input:disabled{opacity:0.35;cursor:not-allowed;}
.execute-btn{background:var(--accent);color:#000;border:none;padding:10px 20px;font-family:var(--font-hd);font-weight:700;cursor:pointer;letter-spacing:1px;font-size:13px;margin:7px 0;flex-shrink:0;transition:opacity 0.2s;}
.execute-btn:disabled{opacity:0.35;cursor:not-allowed;}
.stop-btn{background:#ff4444;color:#fff;border:none;padding:10px 16px;font-family:var(--font-hd);font-weight:700;cursor:pointer;font-size:13px;margin:7px 0;flex-shrink:0;box-shadow:0 0 14px rgba(255,68,68,0.35);display:none;letter-spacing:1px;}
.input-hint{font-size:9px;font-family:var(--font-mono);color:rgba(255,255,255,0.18);text-align:center;margin-top:6px;max-width:820px;margin-left:auto;margin-right:auto;}
</style>
</head>
<body class="space">
<canvas id="starfield"></canvas>

<div class="app">
  <aside class="sidebar">
    <div class="logo-block">
      <img id="logo-icon" class="logo-icon" src="images/space-icon.png" onerror="this.onerror=null; this.src='images/space-icon2.png';">
      <div class="logo-name" id="logo-text">NOVA</div>
    </div>

    <div class="mode-switch">
      <button class="mode-btn active" id="btn-space" onclick="switchMode('space')">SPACE</button>
      <button class="mode-btn" id="btn-ocean" onclick="switchMode('ocean')">OCEAN</button>
    </div>

    <div class="nav-label">DIRECT QUERIES</div>
    <div class="questions-list" id="questions-box"></div>

    <div class="sessions-section">
      <div class="nav-label">MISSION HISTORY</div>
      <div class="sessions-list" id="sessions-list"></div>
    </div>

    <div class="sidebar-footer">
      <button class="new-mission-btn" id="new-mission-btn" onclick="startNewMission()">+ NEW MISSION</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="live-status" id="conn-status">
        <div class="status-dot"></div>
        <span id="conn-label">CONNECTING...</span>
      </div>
      <div class="hud-right">
        <div class="ctx-counter" id="ctx-counter">CTX: 0 MSG</div>
        <div class="hud-sid" id="hud-sid">ID: —</div>
      </div>
    </div>

    <div class="chat-wrap" id="chat-wrap"></div>

    <div class="input-section">
      <div class="command-bar">
        <textarea id="chat-input" rows="1" placeholder="Enter transmission command..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="stop-btn" id="btn-stop" onclick="stopAI()">[ STOP ]</button>
        <button class="execute-btn" id="btn-send" onclick="sendMessage()">EXECUTE</button>
      </div>
      <div class="input-hint">Powered by LLaMA 3.3 via Groq &nbsp;·&nbsp; Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
    </div>
  </main>
</div>

<script>
const API = "";

// ── STATE ──
let mode = 'space';
let sessionId = null;
let conversationHistory = [];
let isBotTyping = false;
let currentInterval = null;
let serverOnline = false;
let retryTimer = null;

// AI names per mode — change these to match your preference
const AI_NAMES = { space: 'NOVA', ocean: 'MARINA' };

// Portrait images — place your files in the images/ folder
// images/nova-portrait.png   → shown next to NOVA title in space mode
// images/marina-portrait.png → shown next to MARINA title in ocean mode
const AI_PORTRAITS = { space: 'images/nova-portrait.png', ocean: 'images/marina-portrait.png' };

// Orb images — the rocket / submarine that float inside the glowing ball
// images/space-orb.png  → rocket / astronaut / planet (space welcome screen)
// images/ocean-orb.png  → submarine / fish / wave (ocean welcome screen)
const ORB_IMGS = { space: 'images/space-orb.png', ocean: 'images/ocean-orb.png' };

const QUESTIONS = {
  space: ["What is the James Webb Telescope?","Tell me about black holes","Latest Mars missions","How big is the universe?"],
  ocean: ["How deep is the Mariana Trench?","What is bioluminescence?","Explain hydrothermal vents","Giant squid facts"]
};

// ── CANVAS ──
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let particles = [];

function initCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  particles = Array.from({length:130}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*(mode==='space'?1.4:3.5),
    speed: Math.random()*0.35+0.08,
    o: Math.random()*0.7+0.1,
    tw: Math.random()*0.012+0.003, to: Math.random()*Math.PI*2
  }));
}

function draw(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const ts = t*0.001;
  particles.forEach(p => {
    const tw = mode==='space' ? Math.sin(ts*p.tw+p.to)*0.4+0.6 : 1;
    ctx.globalAlpha = p.o*tw;
    if (mode==='ocean') {
      ctx.strokeStyle='#00f2ff'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.stroke();
    } else {
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
    }
    p.y -= p.speed;
    if (p.y<0) { p.y=canvas.height; p.x=Math.random()*canvas.width; }
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(draw);
}

// ── NASA IMAGE ──
async function fetchNasaImg(query) {
  try {
    const r = await fetch('https://images-api.nasa.gov/search?q='+encodeURIComponent(query)+'&media_type=image&page_size=5');
    const d = await r.json();
    const items = d.collection?.items;
    if (!items?.length) return null;
    const item = items[Math.floor(Math.random()*Math.min(3,items.length))];
    if (item?.links && item?.data?.[0]) return {url:item.links[0].href, title:item.data[0].title};
  } catch(e){}
  return null;
}

function getKeyword(text) {
  const t = text.toLowerCase();
  const keys = ['mars','saturn','jupiter','nebula','galaxy','black hole','moon','iss','earth','asteroid','sun','telescope','rocket','astronaut','shark','whale','coral','reef','octopus','trench','bioluminescence','jellyfish','submarine','dolphin'];
  return keys.find(k => t.includes(k)) || null;
}

// ── FETCH HELPER ──
// Same-origin calls only — backend is served from the same FastAPI app.
async function apiFetch(url, options={}) {
  options.headers = {'Content-Type':'application/json', ...(options.headers||{})};
  return fetch(url, options);
}

// ── CONNECTION ──
async function checkConnection() {
  const el = document.getElementById('conn-status');
  const label = document.getElementById('conn-label');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('btn-send');
  try {
    const r = await fetch(API+'/api/health', {signal:AbortSignal.timeout(2500)});
    if (r.ok) {
      serverOnline = true;
      el.className = 'live-status online';
      label.textContent = isBotTyping ? 'PROCESSING...' : 'SYSTEM LIVE';
      if (!isBotTyping) { input.disabled=false; sendBtn.disabled=false; }
      if (retryTimer) { clearInterval(retryTimer); retryTimer=null; }
      return;
    }
  } catch(e){}
  serverOnline = false;
  el.className = 'live-status';
  label.textContent = 'SYSTEM OFFLINE';
  input.disabled=true; sendBtn.disabled=true;
  input.placeholder = 'Server offline — run: python server.py';
  if (!retryTimer) retryTimer = setInterval(checkConnection, 3000);
}

function updateCtxCounter() {
  document.getElementById('ctx-counter').textContent = 'CTX: '+conversationHistory.length+' MSG';
}

// ── INPUT STATE ──
function setInputState(typing) {
  isBotTyping = typing;
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('btn-send');
  const stopBtn = document.getElementById('btn-stop');
  document.getElementById('new-mission-btn').disabled = typing;
  input.disabled = typing;
  sendBtn.disabled = typing;
  sendBtn.style.display = typing ? 'none' : 'block';
  stopBtn.style.display = typing ? 'block' : 'none';
  document.querySelectorAll('.mode-btn').forEach(b => b.disabled=typing);
  document.querySelectorAll('.q-card').forEach(c => c.classList.toggle('disabled',typing));
  if (serverOnline) document.getElementById('conn-label').textContent = typing ? 'PROCESSING...' : 'SYSTEM LIVE';
}

function stopAI() {
  if (currentInterval) { clearInterval(currentInterval); currentInterval=null; }
  document.getElementById('typing-dots-el')?.remove();
  const bubbles = document.querySelectorAll('.bot .bubble');
  const last = bubbles[bubbles.length-1];
  if (last) { last.classList.remove('typing-cursor'); last.textContent += ' [TRANSMISSION ABORTED]'; }
  setInputState(false);
}

// ── TYPEWRITER — fast at 3ms per character ──
function typewriter(element, text) {
  return new Promise(resolve => {
    let i = 0;
    element.classList.add('typing-cursor');
    currentInterval = setInterval(() => {
      // Add 3 chars at a time so it feels fast but still animated
      for (let j=0; j<3 && i<text.length; j++, i++) {
        element.textContent += text.charAt(i);
      }
      document.getElementById('chat-wrap').scrollTop = 999999;
      if (i >= text.length) {
        clearInterval(currentInterval); currentInterval=null;
        element.classList.remove('typing-cursor');
        resolve();
      }
    }, 8);
  });
}

// ── SEND ──
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isBotTyping || !serverOnline) return;

  // Create session on first message
  if (!sessionId) {
    sessionId = 'sid_' + crypto.randomUUID().slice(0,12);
    localStorage.setItem('cosmos_sid_' + mode, sessionId);
    document.getElementById('hud-sid').textContent = 'ID: '+sessionId;
    try {
      await apiFetch(API+'/api/sessions', {
        method:'POST',
        body: JSON.stringify({session_id:sessionId, mode})
      });
    } catch(e){}
  }

  document.getElementById('welcome-screen')?.remove();
  appendMessage('user', text);
  conversationHistory.push({role:'user', content:text});
  updateCtxCounter();

  input.value=''; input.style.height='auto';
  setInputState(true);
  addTypingDots();

  const keyword = getKeyword(text);
  let reply=null, nasaImg=null;

  try {
    const [res, img] = await Promise.all([
      apiFetch(API+'/api/chat', {
        method:'POST',
        body: JSON.stringify({messages:conversationHistory, mode, session_id:sessionId})
      }),
      keyword ? fetchNasaImg(keyword) : Promise.resolve(null)
    ]);
    const data = await res.json();
    reply = data.reply;
    nasaImg = img;
  } catch(e) {
    removeTypingDots();
    appendMessage('bot','ERR: CONNECTION DISRUPTED. Check server status.');
    setInputState(false);
    checkConnection();
    return;
  }

  removeTypingDots();

  // Build bot bubble
  const botDiv = document.createElement('div');
  botDiv.className = 'msg bot';
  const now = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  let nasaHtml = '';
  if (nasaImg) {
    nasaHtml = '<div class="nasa-card"><img src="'+nasaImg.url+'" onerror="this.parentElement.style.display=\'none\'">'
      +'<div class="nasa-cap">DATABASE MATCH: '+escapeAttr(nasaImg.title).toUpperCase()+'</div></div>';
  }
  botDiv.innerHTML = '<div class="msg-body">'+nasaHtml+'<div class="bubble"></div><div class="msg-ts">'+now+'</div></div>';
  document.getElementById('chat-wrap').appendChild(botDiv);
  document.getElementById('chat-wrap').scrollTop = 999999;

  await typewriter(botDiv.querySelector('.bubble'), reply);

  // Push to history only after complete
  conversationHistory.push({role:'assistant', content:reply});
  if (conversationHistory.length > 20) conversationHistory = conversationHistory.slice(-20);
  updateCtxCounter();
  setInputState(false);
  loadSessions();
}

function addTypingDots() {
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className='msg bot'; div.id='typing-dots-el';
  div.innerHTML='<div class="msg-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>';
  wrap.appendChild(div); wrap.scrollTop=999999;
}
function removeTypingDots() { document.getElementById('typing-dots-el')?.remove(); }

function appendMessage(role, text, timestamp) {
  const wrap = document.getElementById('chat-wrap');
  const div = document.createElement('div');
  div.className = 'msg '+role;
  const ts = timestamp ? formatDate(timestamp) : new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  div.innerHTML = '<div class="msg-body"><div class="bubble">'+escapeHtml(text)+'</div><div class="msg-ts">'+ts+'</div></div>';
  wrap.appendChild(div); wrap.scrollTop=999999;
  return div;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Escape a string for safe interpolation into HTML attributes and JS string
// literals (onclick="..."). Use for any value rendered into an attribute or
// event handler; `escapeHtml` is only safe for element-text contexts.
function escapeAttr(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── SESSIONS ──
async function loadSessions() {
  try {
    const r = await apiFetch(API+'/api/sessions?mode='+mode);
    const data = await r.json();
    const list = document.getElementById('sessions-list');
    if (!data.length) {
      list.innerHTML = '<div style="padding:12px 4px;font-size:10px;font-family:var(--font-mono);color:rgba(255,255,255,0.18);">NO MISSIONS YET</div>';
      return;
    }
    list.innerHTML = data.map(s => {
      const isActive = s.session_id===sessionId ? 'active' : '';
      const title = escapeAttr(s.title || 'Inbound Mission');
      const sid = escapeAttr(s.session_id);
      const date = formatDate(s.updated_at);
      return '<div class="session-item '+isActive+'" onclick="openSession(\''+sid+'\',event)">'
        +'<div class="session-info">'
        +'<div class="session-title-text">'+title+'</div>'
        +'<div class="session-date">'+date+'</div>'
        +'</div>'
        +'<button class="session-del" onclick="deleteSession(event,\''+sid+'\')" title="Delete">✕</button>'
        +'</div>';
    }).join('');
  } catch(e){}
}

async function openSession(sid, e) {
  if (isBotTyping) return;
  sessionId = sid;
  // Store per-mode so switching modes doesn't restore wrong session
  localStorage.setItem('cosmos_sid_'+mode, sid);
  document.getElementById('hud-sid').textContent = 'ID: '+sid;

  try {
    const r = await apiFetch(API+'/api/sessions/'+sid);
    const msgs = await r.json();
    const wrap = document.getElementById('chat-wrap');
    wrap.innerHTML=''; conversationHistory=[];

    if (!msgs.length) { renderWelcome(); }
    else {
      msgs.forEach(m => {
        appendMessage(m.role==='user'?'user':'bot', m.content, m.created_at);
        conversationHistory.push({role:m.role==='user'?'user':'assistant', content:m.content});
      });
      if (conversationHistory.length>20) conversationHistory=conversationHistory.slice(-20);
    }
    updateCtxCounter();
    loadSessions();
  } catch(e){ console.error(e); }
}

async function deleteSession(e, sid) {
  e.stopPropagation();
  if (!confirm('Delete this mission?')) return;
  try {
    await apiFetch(API+'/api/sessions/'+sid, {method:'DELETE'});
    if (sid===sessionId) startNewMission();
    else loadSessions();
  } catch(e){}
}

function startNewMission() {
  if (isBotTyping) return;
  sessionId=null;
  conversationHistory=[];
  localStorage.removeItem('cosmos_sid_'+mode);
  document.getElementById('hud-sid').textContent='ID: —';
  updateCtxCounter();
  renderWelcome();
  loadSessions();
}

// ── WELCOME ──
function renderWelcome() {
  const wrap = document.getElementById('chat-wrap');
  wrap.innerHTML='';
  const orbImg = ORB_IMGS[mode];
  const portrait = AI_PORTRAITS[mode];
  const aiName = AI_NAMES[mode];
  const label = mode==='space' ? 'COMMAND CENTER' : 'DEEP OCEAN OPS';

  const div = document.createElement('div');
  div.className='welcome'; div.id='welcome-screen';
  div.innerHTML =
    '<div class="orb-container">'
    +'<div class="orb">'
    // ── YOUR IMAGE GOES HERE ──
    // space mode: put your rocket PNG at images/space-orb.png
    // ocean mode: put your submarine PNG at images/ocean-orb.png
    +'<img class="orb-img" src="'+orbImg+'" onerror="this.style.display=\'none\'" alt="">'
    +'</div></div>'
    +'<div class="welcome-header">'
    // ── AI PORTRAIT GOES HERE ──
    // space mode: put photo/avatar at images/nova-portrait.png
    // ocean mode: put photo/avatar at images/marina-portrait.png
    +'<img class="ai-portrait" src="'+portrait+'" onerror="this.onerror=null; this.src=\''+(mode==='space'?'images/space-icon.png':'images/ocean-icon.png')+'\';" alt="'+aiName+'">'
    +'<h2>'+label+'</h2>'
    +'</div>'
    +'<p>AWAITING TRANSMISSION...</p>';
  wrap.appendChild(div);
}

// ── MODE SWITCH — separate session per mode ──
function switchMode(m) {
  if (isBotTyping) return;
  mode = m;
  document.body.className = m==='ocean' ? 'ocean' : 'space';
  document.getElementById('logo-text').textContent = AI_NAMES[m];
  document.getElementById('logo-icon').src = m==='space' ? 'images/space-icon.png' : 'images/ocean-icon.png';
  document.getElementById('btn-space').classList.toggle('active', m==='space');
  document.getElementById('btn-ocean').classList.toggle('active', m==='ocean');
  document.getElementById('chat-input').placeholder = m==='space' ? 'Enter transmission command...' : 'Enter deep ocean query...';
  renderQuestions();
  initCanvas();

  // Restore the last session for THIS mode, or start fresh
  const savedSid = localStorage.getItem('cosmos_sid_'+m);
  if (savedSid) {
    sessionId = savedSid;
    document.getElementById('hud-sid').textContent = 'ID: '+sessionId;
    openSession(sessionId);
  } else {
    sessionId=null;
    conversationHistory=[];
    document.getElementById('hud-sid').textContent='ID: —';
    updateCtxCounter();
    renderWelcome();
    loadSessions();
  }
}

function renderQuestions() {
  document.getElementById('questions-box').innerHTML = QUESTIONS[mode].map(q =>
    '<div class="q-card" onclick="if(!isBotTyping){document.getElementById(\'chat-input\').value=\''+escapeAttr(q)+'\';sendMessage();}">'+escapeAttr(q)+'</div>'
  ).join('');
}

function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }

function formatDate(dateStr) {
  if (!dateStr) return '';
  const utcStr = dateStr.includes('T') ? dateStr : dateStr.replace(' ','T');
  const d = new Date(utcStr+(utcStr.endsWith('Z')?'':'Z'));
  const now = new Date(); const diff = now-d;
  if (diff<60000) return 'just now';
  if (diff<3600000) return Math.floor(diff/60000)+'m ago';
  if (diff<86400000) return Math.floor(diff/3600000)+'h ago';
  return d.toLocaleDateString();
}

// ── INIT ──
window.addEventListener('resize', initCanvas);
initCanvas();
requestAnimationFrame(draw);
renderQuestions();
checkConnection();
setInterval(checkConnection, 4000);

// Restore last space session or show welcome
const savedSid = localStorage.getItem('cosmos_sid_space');
if (savedSid) {
  sessionId = savedSid;
  document.getElementById('hud-sid').textContent = 'ID: '+sessionId;
  openSession(sessionId);
} else {
  renderWelcome();
  loadSessions();
}
</script>
